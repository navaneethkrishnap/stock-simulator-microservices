spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL}
    password: ${DB_PASS}
    username: ${DB_USER}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      dialect: org.hibernate.dialect.PostgreSQLDialect


server:
  port: 8084